<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pidex — Pi Package Index</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e2e4ed;
    --muted: #6b7280;
    --accent: #6c8eff;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --purple: #a78bfa;
    --orange: #fb923c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }

  /* Nav */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 0; position: sticky; top: 0; z-index: 100; }
  .nav-brand { font-weight: 700; font-size: 16px; color: var(--accent); padding: 14px 24px 14px 0; border-right: 1px solid var(--border); margin-right: 8px; letter-spacing: -0.3px; }
  .nav-brand span { color: var(--muted); font-weight: 400; }
  .nav-tab { padding: 14px 16px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all .15s; font-size: 13px; }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .nav-meta { color: var(--muted); font-size: 12px; }
  .btn-download { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; text-decoration: none; transition: border-color .15s; }
  .btn-download:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon { display: flex; align-items: center; justify-content: center; background: var(--surface); border: 1px solid var(--border); color: var(--muted); width: 30px; height: 30px; border-radius: 6px; text-decoration: none; transition: border-color .15s, color .15s; }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

  /* Tabs */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Stats bar */
  .stats-bar { display: flex; gap: 32px; padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border); align-items: center; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-value { font-size: 20px; font-weight: 700; color: var(--text); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

  /* Filters */
  .filters { display: flex; gap: 10px; padding: 14px 24px; background: var(--bg); border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; }
  .search-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 6px; font-size: 13px; width: 260px; outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; outline: none; }
  select:focus { border-color: var(--accent); }
  .filter-label { color: var(--muted); font-size: 12px; }
  .count-badge { margin-left: auto; color: var(--muted); font-size: 12px; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th { padding: 10px 16px; text-align: left; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: var(--text); }
  th .sort-arrow { opacity: .4; margin-left: 4px; }
  th.sorted .sort-arrow { opacity: 1; color: var(--accent); }
  td { padding: 10px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 13px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  tr:hover td { background: var(--surface); cursor: pointer; }

  /* Cells */
  .pkg-name { font-weight: 500; color: var(--text); }
  .pkg-scope { color: var(--muted); font-weight: 400; }
  .pkg-desc { color: var(--muted); }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
  .badge-skill     { background: rgba(167,139,250,.15); color: var(--purple); }
  .badge-theme     { background: rgba(251,191,36,.15);  color: var(--yellow); }
  .badge-prompt    { background: rgba(251,146,60,.15);  color: var(--orange); }
  .badge-multi     { color: var(--muted); opacity: .65; margin-left: 2px; }
  .type-cell       { max-width: 110px; overflow: hidden; white-space: nowrap; }
  .trend-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; }
  .trend-growing  { background: rgba(52,211,153,.15); color: var(--green); }
  .trend-declining{ background: rgba(248,113,113,.15); color: var(--red); }
  .trend-stable   { background: rgba(107,114,128,.15); color: var(--muted); }
  .trend-new      { background: rgba(251,191,36,.12);  color: var(--yellow); }
  .num { font-variant-numeric: tabular-nums; text-align: right; }
  .num-hi { color: var(--text); }
  .num-lo { color: var(--muted); }
  .fork-icon { color: var(--muted); font-size: 11px; }

  /* Sparkline */
  canvas.spark { display: block; }
  .dl-cell { white-space: nowrap; }
  .dl-inner { display: inline-flex; align-items: center; gap: 6px; width: 100%; }
  .dl-spark { flex: 1; max-width: 80px; display: block; }
  .st-num { min-width: 42px; text-align: right; flex-shrink: 0; }
  /* Drawer */
  .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; }
  .drawer-overlay.open { display: block; }
  .drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 480px; background: var(--surface); border-left: 1px solid var(--border); z-index: 201; overflow-y: auto; padding: 24px; transform: translateX(100%); transition: transform .2s ease; }
  .drawer.open { transform: translateX(0); }
  .drawer-close { float: right; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 0; }
  .drawer-close:hover { color: var(--text); }
  .drawer h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; padding-right: 24px; word-break: break-all; }
  .drawer-desc { color: var(--muted); font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
  .drawer-section { margin-bottom: 20px; }
  .drawer-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 10px; }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .meta-item { background: var(--bg); border-radius: 6px; padding: 10px 12px; }
  .meta-item .label { font-size: 10px; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); margin-bottom: 4px; }
  .meta-item .value { font-size: 15px; font-weight: 600; }
  .similar-list { display: flex; flex-direction: column; gap: 6px; }
  .similar-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg); border-radius: 6px; padding: 8px 12px; cursor: pointer; }
  .similar-item:hover { background: var(--border); }
  .similar-name { font-size: 12px; font-weight: 500; }
  .similar-score { font-size: 11px; color: var(--muted); }
  .links { display: flex; gap: 8px; flex-wrap: wrap; }
  .link-btn { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 5px; font-size: 12px; text-decoration: none; }
  .link-btn:hover { border-color: var(--accent); color: var(--accent); }
  .kw-list { display: flex; gap: 6px; flex-wrap: wrap; }
  .kw { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--muted); }
  .trend-chart { width: 100%; height: 60px; }

  /* Report tab */
  #report-frame { width: 100%; height: calc(100vh - 48px); border: none; background: white; }

  [data-theme="light"] {
    --bg: #f8f9fc;
    --surface: #ffffff;
    --border: #e2e5ec;
    --text: #111318;
    --muted: #6b7280;
    --accent: #3d5afe;
  }
  /* Column filters */
  .filter-row { background: var(--surface); }
  .filter-row th { padding: 4px 8px; background: transparent; border-bottom: 1px solid var(--border); }
  .col-filter { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 7px; border-radius: 4px; font-size: 11px; outline: none; }
  .col-filter:focus { border-color: var(--accent); }
  /* Row actions */
  .row-actions { white-space: nowrap; opacity: 0; transition: opacity .15s; }
  tr:hover .row-actions { opacity: 1; }
  .act-btn { display: inline-flex; align-items: center; justify-content: center; background: var(--surface); border: 1px solid var(--border); color: var(--muted); width: 24px; height: 24px; border-radius: 4px; cursor: pointer; text-decoration: none; margin-right: 2px; transition: border-color .15s, color .15s; flex-shrink: 0; }
  .act-btn:hover { border-color: var(--accent); color: var(--accent); }
  /* Fast CSS tooltip */
  .act-btn { position: relative; }
  .act-btn[data-tip]::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 5px); left: 50%; transform: translateX(-50%); background: #111; color: #eee; padding: 3px 7px; border-radius: 4px; font-size: 11px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity .08s; z-index: 999; }
  .act-btn[data-tip]:hover::after { opacity: 1; }
  .pkg-author { color: var(--muted); cursor: pointer; }
  .pkg-author:hover { color: var(--accent); text-decoration: underline; }
  /* Databars */
  .databar { width: 100%; height: 3px; background: var(--border); border-radius: 2px; margin-top: 3px; }
  .databar-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width .2s; }
  .databar-st { background: var(--yellow); }
  .pub-date { color: var(--muted); white-space: nowrap; }

  /* Responsive */
  @media (max-width: 768px) {
    .drawer { width: 100%; }
    .pkg-desc { display: none; }
    td:nth-child(5), th:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

  <div class="nav-right">

  </div>
</nav>

<!-- Browse tab -->
<div id="tab-browse" class="tab-panel active">
  <div class="stats-bar" id="stats-bar">
    <div class="stat"><div class="stat-value" id="stat-total">—</div><div class="stat-label">Packages</div></div>
    <div class="stat"><div class="stat-value" id="stat-ext">—</div><div class="stat-label">Extensions</div></div>
    <div class="stat"><div class="stat-value" id="stat-skills">—</div><div class="stat-label">Skills</div></div>
    <div class="stat"><div class="stat-value" id="stat-themes">—</div><div class="stat-label">Themes</div></div>
    <div class="stat"><div class="stat-value" id="stat-multi">—</div><div class="stat-label">Multi-harness</div></div>
    <div class="stat"><div class="stat-value" id="stat-updated">—</div><div class="stat-label">Last updated</div></div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:12px">
      <input class="search-input" id="search" placeholder="Search packages…" oninput="render()">
      <span class="count-badge" id="count-badge"></span>
    </div>
  </div>


  <div class="table-wrap">
    <table>
      <thead>
        <tr>
  <th style="width:180px" onclick="sortBy('n')">Name <span class="sort-arrow" id="sa-n"></span></th>
  <th style="width:100px" onclick="sortBy('p')">Author <span class="sort-arrow" id="sa-p"></span></th>
  <th>Description</th>
  <th style="width:80px" onclick="sortBy('t')">Type <span class="sort-arrow" id="sa-t"></span></th>
  <th style="width:160px" class="num" onclick="sortBy('dl')">Downloads/wk <span class="sort-arrow" id="sa-dl">▼</span></th>
  <th style="width:95px" onclick="sortBy('st')" class="num">Stars <span class="sort-arrow" id="sa-st"></span></th>
  <th style="width:75px" onclick="sortBy('dc')">Created <span class="sort-arrow" id="sa-dc"></span></th>
  <th style="width:75px" onclick="sortBy('dt')">Updated <span class="sort-arrow" id="sa-dt"></span></th>
  <th style="width:72px"></th>
        </tr>
        <tr class="filter-row">
  <th><input class="col-filter" placeholder="name…" oninput="render()" id="cf-n"></th>
  <th><input class="col-filter" placeholder="author…" oninput="render()" id="cf-p"></th>
  <th><input class="col-filter" placeholder="desc…" oninput="render()" id="cf-d"></th>
  <th><select class="col-filter" onchange="render()" id="cf-t"><option value="">all</option><option>extension</option><option>skill</option><option>theme</option><option>prompt</option><option>unknown</option><option value="multi">multi-harness</option></select></th>
  <th></th><th></th><th></th><th></th><th></th>
        </tr>
      <tbody id="tbody"></tbody>
    </table>
    <div id="load-more" style="display:none; text-align:center; padding:16px;">
      <button onclick="loadMore()" style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 20px;border-radius:6px;cursor:pointer;">Load more</button>
    </div>
  </div>
</div>

<!-- Report tab -->
<div id="tab-report" class="tab-panel">
  <iframe id="report-frame" src="report.html"></iframe>
</div>

<!-- Drawer -->
<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">✕</button>
  <h2 id="d-name"></h2>
  <p class="drawer-desc" id="d-desc"></p>

  <div class="drawer-section">
    <h3>Stats</h3>
    <div class="meta-grid" id="d-meta"></div>
  </div>

  <div class="drawer-section" id="d-trend-section" style="display:none">
    <h3>Download trend (last 26 weeks)</h3>
    <canvas class="trend-chart" id="d-trend-canvas"></canvas>
  </div>

  <div class="drawer-section" id="d-similar-section" style="display:none">
    <h3>Similar packages</h3>
    <div class="similar-list" id="d-similar"></div>
  </div>

  <div class="drawer-section" id="d-kw-section" style="display:none">
    <h3>Keywords</h3>
    <div class="kw-list" id="d-kw"></div>
  </div>

  <div class="drawer-section">
    <h3>Links</h3>
    <div class="links" id="d-links"></div>
  </div>
</div>

<script>
let ALL = [], filtered = [], pkgMap = {};
let PAGE = 50, shown = 0;
let GLOBAL_MAX = 1;
let VIEW_MAX_ST = 1, VIEW_MAX_SPARK = 1;
let SORT_COL = 'dl', SORT_DIR = 1;

async function init() {
  const res = await fetch('data/packages.json');
  ALL = await res.json();
  ALL.forEach(p => pkgMap[p.n] = p);

  // Global sparkline scale
  GLOBAL_MAX = Math.max(1, ...ALL.flatMap(p => p.tr || []));
  // Stats
  document.getElementById('stat-total').textContent   = ALL.length.toLocaleString();
  document.getElementById('stat-ext').textContent     = ALL.filter(p=>p.t==='extension').length.toLocaleString();
  document.getElementById('stat-skills').textContent  = ALL.filter(p=>p.t==='skill').length.toLocaleString();
  document.getElementById('stat-themes').textContent  = ALL.filter(p=>p.t==='theme').length.toLocaleString();
  document.getElementById('stat-multi').textContent   = ALL.filter(p=>p.mh).length.toLocaleString();

  // Last updated: most recent dt across all packages
  const dates = ALL.map(p=>p.dt).filter(Boolean).sort();
  const lastDate = dates.length ? new Date(dates[dates.length-1]).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
  document.getElementById('stat-updated').textContent = lastDate;

  // Nav meta — removed per request
  render();
}

function sortBy(col) {
  if (SORT_COL === col) SORT_DIR *= -1;
  else { SORT_COL = col; SORT_DIR = 1; }
  // Update arrows
  document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '');
  const arrow = document.getElementById('sa-' + col);
  if (arrow) arrow.textContent = SORT_DIR === 1 ? '▼' : '▲';
  render();
}

function render() {
  const q    = document.getElementById('search').value.toLowerCase();
  const cfN  = document.getElementById('cf-n').value.toLowerCase();
  const cfP  = document.getElementById('cf-p').value.toLowerCase();
  const cfD  = document.getElementById('cf-d').value.toLowerCase();
  const cfT  = document.getElementById('cf-t').value;

  filtered = ALL.filter(p => {
    if (cfT === 'multi') { if (!p.mh) return false; }
    else if (cfT)        { if (p.t !== cfT) return false; }
    if (cfN && !(p.n||'').toLowerCase().includes(cfN)) return false;
    if (cfP && !(p.p||'').toLowerCase().includes(cfP)) return false;
    if (cfD && !(p.d||'').toLowerCase().includes(cfD)) return false;
    if (q) {
      const hay = (p.n + ' ' + (p.d||'') + ' ' + (p.p||'')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  filtered.sort((a,b) => {
    let v = 0;
    if (SORT_COL === 'dl') v = (b.dl||0) - (a.dl||0);
    else if (SORT_COL === 'st') v = (b.st||0) - (a.st||0);
    else if (SORT_COL === 'n')  v = a.n.localeCompare(b.n);
    else if (SORT_COL === 'p')  v = (a.p||'').localeCompare(b.p||'');
    else if (SORT_COL === 't')  v = (a.t||'').localeCompare(b.t||'');
    else if (SORT_COL === 'dt') v = (b.dt||'') > (a.dt||'') ? 1 : -1;
    else if (SORT_COL === 'dc') v = (b.dc||'') > (a.dc||'') ? 1 : -1;
    return v * SORT_DIR;
  });

  // View-relative scales for sparklines + stars databar
  VIEW_MAX_ST    = Math.max(1, ...filtered.filter(p=>p.st).map(p=>p.st));
  VIEW_MAX_SPARK = Math.max(1, ...filtered.flatMap(p => p.tr || []));
  document.getElementById('count-badge').textContent = `${filtered.length.toLocaleString()} packages`;
  shown = 0;
  document.getElementById('tbody').innerHTML = '';
  loadMore();
}

function loadMore() {
  const tbody = document.getElementById('tbody');
  const chunk = filtered.slice(shown, shown + PAGE);
  chunk.forEach(p => tbody.appendChild(makeRow(p)));
  shown += chunk.length;
  document.getElementById('load-more').style.display = shown < filtered.length ? 'block' : 'none';
}

function makeRow(p) {
  const tr = document.createElement('tr');

  const unscoped = p.n.includes('/') ? p.n.split('/').slice(1).join('/') : p.n;
  const forkIcon = p.fk ? ' ⓡ' : '';
  const author   = p.p || '';

  const dlStr   = p.dl != null ? fmtNum(p.dl) : '—';
  const dlClass  = p.dl > 5000 ? 'num-hi' : 'num-lo';
  const stStr   = p.st != null ? fmtNum(p.st) : '—';
  const stClass  = p.st > 500 ? 'num-hi' : 'num-lo';
  const stPct    = p.st ? Math.round((p.st / VIEW_MAX_ST) * 100) : 0;

  // Date helpers
  const fmtDate = d => d ? new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
  const updAgo  = p.dt ? timeAgo(p.dt) : '—';
  const creAgo  = p.dc ? timeAgo(p.dc) : '—';
  const sparkId  = 'sp-' + Math.random().toString(36).slice(2);
  const installCmd = `pi install npm:${p.n}`;
  const npmUrl     = `https://www.npmjs.com/package/${encodeURIComponent(p.n)}`;
  const ghMatch    = p.gh && p.gh.match(/github\.com[:/]([^/]+\/[^/.]+)/);
  const ghUrl      = ghMatch ? `https://github.com/${ghMatch[1].replace(/\.git$/,'')}` : '';

  tr.innerHTML = `
    <td onclick="openDrawer('${escAttr(p.n)}')"><div class="pkg-name">${escHtml(unscoped)}${forkIcon}</div></td>
    <td><span class="pkg-author" onclick="filterAuthor('${escAttr(author)}')">${escHtml(author)}</span></td>
    <td onclick="openDrawer('${escAttr(p.n)}')"><div class="pkg-desc">${escHtml(p.d||'')}</div></td>
    <td class="type-cell">
      ${!['extension','unknown'].includes(p.t) ? `<span class="badge badge-${p.t}" onclick="filterType('${p.t}')" style="cursor:pointer">${p.t}</span>` : ''}
      ${p.mh ? '<span class="badge badge-multi" title="Works with multiple AI agents">multi</span>' : ''}
    </td>
    <td onclick="openDrawer('${escAttr(p.n)}')" class="dl-cell">
      <div class="dl-inner">
        <span class="${dlClass}">${dlStr}</span>
        <canvas id="${sparkId}" class="spark dl-spark" height="20"></canvas>
      </div>
    </td>
    <td class="dl-cell" onclick="openDrawer('${escAttr(p.n)}')">
      <div class="dl-inner">
        <span class="st-num ${stClass}">${stStr}</span>
        <div class="databar dl-spark" style="align-self:center"><div class="databar-fill databar-st" style="width:${stPct}%"></div></div>
      </div>
    </td>
    <td onclick="openDrawer('${escAttr(p.n)}')"><span class="pub-date" title="${escAttr(fmtDate(p.dc))}">${creAgo}</span></td>
    <td onclick="openDrawer('${escAttr(p.n)}')"><span class="pub-date" title="${escAttr(fmtDate(p.dt))}">${updAgo}</span></td>
    <td class="row-actions">
      <button class="act-btn act-copy" data-tip="${escAttr(installCmd)}" onclick="copyCmd('${escAttr(installCmd)}',this)">
        <svg class="ic-copy" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <svg class="ic-check" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:none"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
      <a class="act-btn" href="${npmUrl}" target="_blank" data-tip="npm"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M0 0v24h24V0H0zm19.2 19.2H12v-9.6h-2.4v9.6H4.8V4.8h14.4v14.4z"/></svg></a>
      ${ghUrl ? `<a class="act-btn" href="${ghUrl}" target="_blank" title="GitHub"><svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg></a>` : ''}
    </td>
  `;

  requestAnimationFrame(() => {
    const c = document.getElementById(sparkId);
    if (c && p.tr && p.tr.length > 1) {
      c.width = c.offsetWidth || 120;  // match CSS width
      drawSparkline(c, p.tr, VIEW_MAX_SPARK);
    }
  });

  return tr;
}

function drawSparkline(canvas, data, globalMax) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const max = globalMax || Math.max(...data, 1);
  ctx.clearRect(0,0,w,h);
  ctx.beginPath();
  data.forEach((v, i) => {
    const x = (i / (data.length-1)) * w;
    const y = h - (v/max) * (h-2) - 1;
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.strokeStyle = '#6c8eff';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function fmtNum(n) {
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return n.toLocaleString();
}

function timeAgo(iso) {
  const sec = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (sec < 60)  return sec + 's';
  const min = Math.floor(sec / 60);
  if (min < 60)  return min + 'min';
  const hr  = Math.floor(min / 60);
  if (hr  < 24)  return hr  + 'h';
  const day = Math.floor(hr  / 24);
  if (day < 7)   return day + 'd';
  const wk  = Math.floor(day / 7);
  if (wk  < 5)   return wk  + 'w';
  const mo  = Math.floor(day / 30);
  if (mo  < 12)  return mo  + 'm';
  const yr  = Math.floor(day / 365);
  const rem = Math.floor((day % 365) / 30);
  return rem > 0 ? yr + 'y' + rem + 'm' : yr + 'y';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escAttr(s) {
  return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

function filterType(t) {
  document.getElementById('cf-t').value = t;
  render();
}

function filterAuthor(a) {
  document.getElementById('cf-p').value = a.toLowerCase();
  render();
}

function copyCmd(cmd, btn) {
  navigator.clipboard.writeText(cmd).then(() => {
    const copy  = btn.querySelector('.ic-copy');
    const check = btn.querySelector('.ic-check');
    copy.style.display  = 'none';
    check.style.display = '';
    setTimeout(() => {
      copy.style.display  = '';
      check.style.display = 'none';
    }, 1200);
  });
}

function openDrawer(name) {
  const p = pkgMap[name];
  if (!p) return;

  document.getElementById('d-name').textContent = p.n;
  document.getElementById('d-desc').textContent = p.d || 'No description';

  // Meta grid
  document.getElementById('d-meta').innerHTML = [
    { label: 'Downloads/wk', value: p.dl != null ? p.dl.toLocaleString() : '—' },
    { label: 'GitHub Stars', value: p.st != null ? p.st.toLocaleString() : '—' },
    { label: 'Trend',        value: p.tt || '—' },
    { label: 'Type',         value: p.t  || '—' },
    { label: 'Version',      value: p.v  || '—' },
    { label: 'Fork',         value: p.fk ? 'Yes ⑂' : 'No' },
  ].map(m => `<div class="meta-item"><div class="label">${m.label}</div><div class="value">${m.value}</div></div>`).join('');

  // Trend chart
  const trendSection = document.getElementById('d-trend-section');
  if (p.tr && p.tr.length > 1) {
    trendSection.style.display = 'block';
    requestAnimationFrame(() => {
      const c = document.getElementById('d-trend-canvas');
      c.width = c.offsetWidth;
      drawSparkline(c, p.tr);
    });
  } else { trendSection.style.display = 'none'; }

  // Similar
  const simSection = document.getElementById('d-similar-section');
  if (p.si && p.si.length) {
    simSection.style.display = 'block';
    document.getElementById('d-similar').innerHTML = p.si.map(s => {
      const sp = pkgMap[s.name];
      const dl = sp && sp.dl ? `${fmtNum(sp.dl)}/wk` : '';
      return `<div class="similar-item" onclick="openDrawer('${escHtml(s.name)}')">
        <span class="similar-name">${escHtml(s.name)}</span>
        <span class="similar-score">${dl} · ${Math.round(s.score*100)}% similar</span>
      </div>`;
    }).join('');
  } else { simSection.style.display = 'none'; }

  // Keywords
  const kwSection = document.getElementById('d-kw-section');
  if (p.kw && p.kw.length) {
    kwSection.style.display = 'block';
    document.getElementById('d-kw').innerHTML = p.kw.map(k => `<span class="kw">${escHtml(k)}</span>`).join('');
  } else { kwSection.style.display = 'none'; }

  // Links
  const links = [];
  if (p.n) links.push(`<a class="link-btn" href="https://www.npmjs.com/package/${encodeURIComponent(p.n)}" target="_blank">npm ↗</a>`);
  if (p.gh) {
    const m = p.gh.match(/github\.com[:/]([^/]+\/[^/.]+)/);
    if (m) links.push(`<a class="link-btn" href="https://github.com/${m[1].replace(/\.git$/,'')}" target="_blank">GitHub ↗</a>`);
  }
  links.push(`<a class="link-btn" href="https://pi.dev/packages?q=${encodeURIComponent(p.n)}" target="_blank">pi.dev ↗</a>`);
  document.getElementById('d-links').innerHTML = links.join('');

  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function switchTab(name, el) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

function toggleTheme() {
  const isLight = document.documentElement.dataset.theme === 'light';
  document.documentElement.dataset.theme = isLight ? '' : 'light';
  document.getElementById('ti-dark').style.display  = isLight ? '' : 'none';
  document.getElementById('ti-light').style.display = isLight ? 'none' : '';
  localStorage.setItem('pidex-theme', isLight ? 'dark' : 'light');
}

// Restore saved theme
(function() {
  const t = localStorage.getItem('pidex-theme');
  if (t === 'light') {
    document.documentElement.dataset.theme = 'light';
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('ti-dark').style.display = 'none';
      document.getElementById('ti-light').style.display = '';
    });
  }
})();

init();
</script>
</body>
</html>
