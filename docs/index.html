<!DOCTYPE html>
<html lang="en" data-theme-storage-key="pi:theme" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Packages · Pi</title>
  <link rel="stylesheet" href="pi-style.css">
  <script>
    (() => {
      const root = document.documentElement;
      const stored = localStorage.getItem('pi:theme');
      const mode = stored === 'light' || stored === 'dark' ? stored : 'system';
      const theme = mode === 'system'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : mode;
      root.dataset.theme = theme;
      root.dataset.themeMode = mode;
      root.style.colorScheme = theme;
    })();
  </script>
</head>
<body>
  <!-- Minimal nav -->
  <nav style="position:sticky;top:0;z-index:100;display:flex;align-items:center;padding:0 2rem;border-bottom:1px solid var(--line);background:var(--bg);gap:1rem;">
    <a href="/" style="font-family:var(--mono);font-weight:700;font-size:1rem;color:var(--text);text-decoration:none;padding:0.85rem 0;display:flex;align-items:center;gap:0.4rem;">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <rect x="2" y="2" width="7" height="7" rx="1.5" fill="currentColor"/>
        <rect x="11" y="2" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.4"/>
        <rect x="2" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.4"/>
        <rect x="11" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.4"/>
      </svg>
      Pi
    </a>
    <span style="color:var(--muted);font-size:0.85rem;">Packages</span>
    <button type="button" id="theme-toggle" style="margin-left:auto;background:none;border:1px solid var(--line);color:var(--muted);padding:0.3rem 0.7rem;border-radius:4px;cursor:pointer;font-size:0.75rem;" onclick="toggleTheme()">Toggle theme</button>
  </nav>

  <div class="site-tilt-layer">
    <main class="page-shell page-shell--home" style="--page-shell-columns:1fr;display:block;max-width:72rem;margin:0 auto;">

      <!-- Recently published strip -->
      <section class="surface-panel content-card packages-recent-card" style="margin-bottom:1.5rem;">
        <header class="content-card-header">
          <h2 class="content-card-title">Recently published</h2>
        </header>
        <div class="content-card-body">
          <div class="content-grid content-grid--four packages-recent-list" id="recent-list">
            <!-- filled by JS -->
          </div>
        </div>
      </section>

      <!-- All packages -->
      <section class="surface-panel content-card packages-index-card">
        <header class="content-card-header">
          <h2 class="content-card-title">All packages</h2>
          <div class="content-card-actions">
            <span class="packages-count" id="packages-count">0 / 0</span>
          </div>
        </header>
        <div class="content-card-body">
          <!-- Filter bar -->
          <form class="action-bar packages-action-bar" id="filter-form" onsubmit="return false;">
            <label class="action-bar-field">
              <span class="visually-hidden">Filter packages</span>
              <input class="text-control" type="search" id="search" placeholder="Filter packages…" autocomplete="off">
            </label>
            <label class="action-bar-field">
              <span class="visually-hidden">Filter by type</span>
              <span class="select-control-shell">
                <select class="select-control" id="f-type">
                  <option value="">All types</option>
                  <option value="extension">extension</option>
                  <option value="skill">skill</option>
                  <option value="theme">theme</option>
                  <option value="prompt">prompt</option>
                </select>
                <svg class="select-control-caret" viewBox="0 0 20 20" aria-hidden="true"><path fill="currentColor" d="M5.5 7.5 10 12l4.5-4.5H5.5Z"/></svg>
              </span>
            </label>
            <label class="action-bar-field">
              <span class="visually-hidden">Sort</span>
              <span class="select-control-shell">
                <select class="select-control" id="f-sort">
                  <option value="dl">Most downloads</option>
                  <option value="dt">Recently published</option>
                  <option value="n">A-Z</option>
                </select>
                <svg class="select-control-caret" viewBox="0 0 20 20" aria-hidden="true"><path fill="currentColor" d="M5.5 7.5 10 12l4.5-4.5H5.5Z"/></svg>
              </span>
            </label>
          </form>

          <!-- Card grid -->
          <div class="content-grid content-grid--two packages-grid" id="pkg-grid"></div>

          <!-- Load more -->
          <div style="text-align:center;padding:1.5rem 0" id="load-more-wrap">
            <button type="button" class="action-button" id="load-more">Load more</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
  // ── SVG icons ─────────────────────────────────────────────────────────────
  const NPM_SVG = `<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M0 7.334v8h6.666v1.332H12v-1.332h12v-8H0zm6.666 6.664H5.334v-4H3.999v4H1.335V8.667h5.331v5.331zm4 0v1.336H8.001V8.667h5.334v5.332h-2.669v-.001zm12.001 0h-1.33v-4h-1.336v4h-1.335v-4h-1.33v4h-2.671V8.667h8.002v5.331zM10.665 10H12v2.667h-1.335V10z"/></svg>`;
  const GH_SVG = `<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>`;
  const REPORT_SVG = `<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>`;

  // ── Time ago ───────────────────────────────────────────────────────────────
  function timeAgo(ms) {
    const diff = Date.now() - ms;
    const s = diff / 1000;
    if (s < 60) return 'just now';
    const m = s / 60;
    if (m < 60) return Math.round(m) + 'm ago';
    const h = m / 60;
    if (h < 24) return Math.round(h) + 'h ago';
    const d = h / 24;
    if (d < 30) return Math.round(d) + 'd ago';
    const mo = d / 30.44;
    if (mo < 12) return Math.round(mo) + 'mo ago';
    return Math.round(mo / 12) + 'y ago';
  }

  // ── Format downloads ───────────────────────────────────────────────────────
  function fmtDl(weekly) {
    if (weekly == null) return null;
    const mo = Math.round(weekly * 4.33);
    if (mo >= 1000000) return (mo / 1000000).toFixed(1).replace(/\.0$/, '') + 'M/mo';
    if (mo >= 1000) return (mo / 1000).toFixed(1).replace(/\.0$/, '') + 'k/mo';
    return mo + '/mo';
  }

  // ── Build a package card ───────────────────────────────────────────────────
  function buildCard(pkg) {
    const name = pkg.n;
    const npmUrl = `https://www.npmjs.com/package/${encodeURIComponent(name)}`;
    const dl = fmtDl(pkg.dl);
    const ago = pkg.dt ? timeAgo(pkg.dt) : null;
    const copyText = `pi install npm:${name}`;

    const metaSpans = [
      pkg.p ? `<span>${pkg.p}</span>` : '',
      dl ? `<span>${dl}</span>` : '',
      ago ? `<span>${ago}</span>` : '',
    ].filter(Boolean).join('\n      ');

    const repoLink = pkg.gh
      ? `<a href="${pkg.gh}" target="_blank" rel="noopener">${GH_SVG} repo</a>`
      : '';

    return `<article class="surface-panel content-card" data-package-card="true" data-package-name="${name}">
  <div class="packages-card-body">
    <h3 class="packages-name">
      <a href="${npmUrl}" target="_blank" rel="noopener">${name}</a>
    </h3>
    <p class="packages-desc">${pkg.d ? pkg.d.replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''}</p>
    <div class="packages-meta">
      ${metaSpans}
    </div>
    <div class="packages-badges">
      <span class="meta-chip packages-badge" data-type="${pkg.t}">${pkg.t}</span>
    </div>
    <div class="packages-links" aria-label="Links for ${name}">
      <a href="${npmUrl}" target="_blank" rel="noopener">${NPM_SVG} npm</a>
      ${repoLink}
      <a href="https://pi.dev/report?pkg=${encodeURIComponent(name)}" target="_blank" rel="noopener">${REPORT_SVG} report</a>
    </div>
    <div class="packages-install">
      <code><span class="prefix">$</span> ${copyText}</code>
      <button type="button" data-copy="${copyText}" class="action-button">Copy</button>
    </div>
  </div>
</article>`;
  }

  // ── Build a recent item ────────────────────────────────────────────────────
  function buildRecentItem(pkg) {
    const name = pkg.n;
    const npmUrl = `https://www.npmjs.com/package/${encodeURIComponent(name)}`;
    const desc = pkg.d ? pkg.d.substring(0, 80) + (pkg.d.length > 80 ? '…' : '') : '';
    const ago = pkg.dt ? timeAgo(pkg.dt) : '';
    return `<a href="${npmUrl}" class="packages-recent-item" target="_blank" rel="noopener">
  <strong>${name}</strong>
  <span>${desc.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>
  <small>${ago}</small>
</a>`;
  }

  // ── Sorted intersection ────────────────────────────────────────────────────
  function intersect(a, b) {
    // both arrays are sorted ascending; return sorted intersection
    const result = [];
    let i = 0, j = 0;
    while (i < a.length && j < b.length) {
      if (a[i] === b[j]) { result.push(a[i]); i++; j++; }
      else if (a[i] < b[j]) i++;
      else j++;
    }
    return result;
  }

  // ── Tokenize ───────────────────────────────────────────────────────────────
  function tokenize(q) {
    return q.toLowerCase().replace(/[^a-z0-9@/-]/g, ' ').split(/\s+/).filter(s => s.length >= 2);
  }

  // ── Main state ─────────────────────────────────────────────────────────────
  let DB = null;
  let filteredIds = [];    // sorted array of record indices matching current filters
  let page = 0;
  const PAGE_SIZE = 50;

  function applyFilters() {
    const q = document.getElementById('search').value.trim();
    const type = document.getElementById('f-type').value;
    const sort = document.getElementById('f-sort').value;

    const idx = DB.index;
    const sortOrder = idx.sort[sort]; // array of record indices, sorted

    // Start with the full sort order
    let candidates = sortOrder;

    // Filter by type
    if (type) {
      const byType = new Set(idx.byType[type] || []);
      candidates = candidates.filter(i => byType.has(i));
    }

    // Filter by search tokens
    if (q.length > 0) {
      const tokens = tokenize(q);
      if (tokens.length > 0) {
        // For each token, get matching IDs from inverted index (sorted)
        let searchIds = null;
        for (const tok of tokens) {
          // Find all keys in byToken that start with the token
          const matching = Object.keys(idx.byToken).filter(k => k.startsWith(tok));
          if (matching.length === 0) { searchIds = []; break; }
          // Union all matching token arrays, then dedupe+sort
          let union = [];
          for (const k of matching) union = union.concat(idx.byToken[k]);
          union = [...new Set(union)].sort((a,b) => a-b);
          if (searchIds === null) searchIds = union;
          else searchIds = intersect(searchIds, union);
        }
        const searchSet = new Set(searchIds);
        candidates = candidates.filter(i => searchSet.has(i));
      }
    }

    filteredIds = candidates;
    page = 0;
    renderGrid();
    updateCount();
  }

  function renderGrid() {
    const grid = document.getElementById('pkg-grid');
    const slice = filteredIds.slice(0, (page + 1) * PAGE_SIZE);
    grid.innerHTML = slice.map(i => buildCard(DB.records[i])).join('\n');
    // Show/hide load more
    const lmw = document.getElementById('load-more-wrap');
    lmw.style.display = filteredIds.length > slice.length ? '' : 'none';
    attachCopyHandlers(grid);
  }

  function updateCount() {
    document.getElementById('packages-count').textContent =
      `${filteredIds.length} / ${DB.records.length}`;
  }

  function attachCopyHandlers(root) {
    root.querySelectorAll('button[data-copy]').forEach(btn => {
      btn.addEventListener('click', () => {
        const text = btn.dataset.copy;
        navigator.clipboard.writeText(text).then(() => {
          const orig = btn.textContent;
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = orig; }, 1500);
        }).catch(() => {});
      });
    });
  }

  function renderRecent() {
    const idx = DB.index;
    const recentIds = [...idx.sort.dt].reverse().slice(0, 8);
    document.getElementById('recent-list').innerHTML =
      recentIds.map(i => buildRecentItem(DB.records[i])).join('\n');
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  fetch('data/packages-db.json')
    .then(r => r.json())
    .then(db => {
      DB = db;
      renderRecent();
      applyFilters();

      // Event listeners
      let searchTimer;
      document.getElementById('search').addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(applyFilters, 200);
      });
      document.getElementById('f-type').addEventListener('change', applyFilters);
      document.getElementById('f-sort').addEventListener('change', applyFilters);
      document.getElementById('load-more').addEventListener('click', () => {
        page++;
        renderGrid();
      });
    })
    .catch(err => {
      console.error('Failed to load package DB:', err);
      document.getElementById('pkg-grid').innerHTML =
        '<p class="packages-empty" style="grid-column:1/-1;padding:2rem;color:var(--muted);">Failed to load packages.</p>';
    });

  // ── Theme toggle ───────────────────────────────────────────────────────────
  function toggleTheme() {
    const root = document.documentElement;
    const current = root.dataset.theme;
    const next = current === 'dark' ? 'light' : 'dark';
    root.dataset.theme = next;
    root.dataset.themeMode = next;
    root.style.colorScheme = next;
    localStorage.setItem('pi:theme', next);
  }
  </script>
</body>
</html>
